<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact CarbonBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Montserrat',sans-serif;background:#0B0C10;color:#E0E0E0;}
header{position:fixed;width:100%;top:0;left:0;background:rgba(15,15,15,0.95);display:flex;justify-content:space-between;align-items:center;padding:1rem 3rem;box-shadow:0 2px 10px rgba(0,255,128,0.2);}
header .logo{color:#00FF96;font-weight:700;font-size:1.5rem;}
header nav a{color:#00FF96;margin-left:2rem;font-weight:500;}
header nav a:hover{color:#2CF5A0;}
section{padding:6rem 3rem;max-width:600px;margin:0 auto;text-align:center;}
h2{color:#00FF96;font-size:2.2rem;margin-bottom:1.5rem;}
input,textarea{width:100%;padding:1rem;margin-bottom:1rem;border-radius:6px;border:none;font-size:1rem;}
button{padding:.8rem 2rem;background:#00FF96;color:#0B0C10;font-weight:700;border-radius:6px;}
button:hover{background:#2CF5A0;}
footer{background:#0B0C10;color:#00FF96;text-align:center;padding:2rem;margin-top:4rem;}
footer a{color:#2CF5A0;margin:0 .5rem;}
</style>
</head>
<body>
<header>
  <div class="logo">CarbonBridge</div>
  <nav><a href="index.html">Home</a></nav>
</header>

<section>
  <h2>Contact Us</h2>
  <p>Have questions or want to join early access? Drop us a message below!</p>
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Message" rows="5" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</section>

<footer>
  <p>&copy; 2026 CarbonBridge. All rights reserved.</p>
  <p><a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms</a></p>
</footer>
</body>
</html>
