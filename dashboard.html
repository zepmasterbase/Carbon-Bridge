<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbonBridge Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{color:#E0E0E0;background:#0B0C10;scroll-behavior:smooth;overflow-x:hidden;}
header{position:fixed;width:100%;top:0;left:0;z-index:1000;background:rgba(15,15,15,0.95);display:flex;justify-content:space-between;align-items:center;padding:1rem 3rem;box-shadow:0 2px 10px rgba(0,255,128,0.2);}
header.scrolled{background:rgba(15,15,15,1);box-shadow:0 4px 20px rgba(0,255,128,0.3);}
.logo{font-weight:700;font-size:1.5rem;color:#00FF96;letter-spacing:1px;cursor:pointer;}
nav a{font-weight:500;color:#00FF96;font-size:1rem;margin-left:2rem;}
nav a:hover{color:#2CF5A0;}
#walletAddress{color:#00FF96;font-weight:600;}
.dashboard{padding:6rem 3rem;max-width:1200px;margin:0 auto;}
.card-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem;margin-top:2rem;}
.project-card{background:#1F1F2C;border-radius:12px;padding:1.5rem;display:flex;flex-direction:column;align-items:center;transition:.3s;box-shadow:0 6px 20px rgba(0,255,128,.1);}
.project-card:hover{transform:translateY(-8px);box-shadow:0 12px 25px rgba(0,255,128,.3);}
.project-card h3{color:#00FF96;margin-bottom:.5rem;text-align:center;}
.project-card p{font-size:.95rem;margin-bottom:.5rem;text-align:center;}
.project-card button{padding:.6rem;background:#00FF96;color:#0B0C10;font-weight:700;margin:0.3rem;width:120px;border-radius:6px;}
.project-card button:hover{background:#2CF5A0;transform:translateY(-2px);}
.co2-meter{width:100%;background:#0F1118;border-radius:12px;margin-top:1rem;overflow:hidden;}
.co2-meter-fill{height:16px;background:#00FF96;width:0%;border-radius:12px;}
#tokenCanvas{width:150px;height:150px;margin-bottom:1rem;}
.project-icon{width:24px;height:24px;margin-left:0.5rem;cursor:pointer;filter:invert(0.8);}
@media(max-width:768px){.card-container{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header id="header">
  <div class="logo" onclick="window.location.href='index.html'">CarbonBridge</div>
  <nav>
    <a href="projects.html">Projects <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="project-icon" alt="projects icon"></a>
    <span id="walletAddress">Not Connected</span>
  </nav>
</header>

<div class="dashboard">
  <h2 style="text-align:center;color:#00FF96;">Your CarbonBridge Dashboard</h2>
  <p style="text-align:center;">Track your token balances, retire tokens, and see your real-time CO₂ impact!</p>
  
  <div class="card-container" id="cardContainer">
    <!-- Project cards inserted here dynamically -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
<script>
let provider, signer, contract;
const contractAddress="0xYourContractAddress"; // Replace with your Ethereum contract
const abi=[
  "function purchaseCarbonToken(uint256 projectId) public payable",
  "function balanceOf(address owner,uint256 projectId) public view returns(uint256)",
  "function retireToken(uint256 projectId,uint256 amount) public",
  "function retirementHistory(address owner,uint256 projectId) public view returns(uint256)"
];

// Sample projects for demo
const projects=[
  {name:'Kenya Reforestation',type:'Trees',co2:500,location:'Kenya',id:0},
  {name:'India Solar Farm',type:'Solar',co2:1200,location:'India',id:1},
  {name:'US Wind Energy',type:'Wind',co2:800,location:'USA',id:2},
  {name:'Brazil Forest Conservation',type:'Trees',co2:700,location:'Brazil',id:3}
];

const cardContainer=document.getElementById('cardContainer');

// ---------- Initialize Web3 ----------
async function init(){
  const savedWallet=localStorage.getItem('connectedWallet');
  if(window.ethereum){
    provider=new ethers.BrowserProvider(window.ethereum);
    signer=await provider.getSigner();
    const address=savedWallet || await signer.getAddress();
    document.getElementById('walletAddress').innerText="Connected: "+address;
    contract=new ethers.Contract(contractAddress,abi,signer);
    loadDashboard();
  }else{
    alert("Please install MetaMask or Base wallet!");
  }
}

// ---------- Load Dashboard ----------
async function loadDashboard(){
  cardContainer.innerHTML="";
  const userAddr=await signer.getAddress();
  for(let p of projects){
    const card=document.createElement('div');
    card.className='project-card';
    card.innerHTML=`
      <canvas id="tokenCanvas-${p.id}"></canvas>
      <h3>${p.name}</h3>
      <p>Type: ${p.type}</p>
      <p>CO₂ Offset: ${p.co2} tons</p>
      <p>Location: ${p.location}</p>
      <button onclick="buyToken(${p.id})">Buy Token</button>
      <button onclick="retireToken(${p.id})">Retire Tokens</button>
      <p id="balance-${p.id}">Balance: Loading...</p>
      <div class="co2-meter"><div id="co2-fill-${p.id}" class="co2-meter-fill"></div></div>
    `;
    cardContainer.appendChild(card);
    init3DToken(`tokenCanvas-${p.id}`);
    updateProjectBalance(p.id);
  }
}

// ---------- Buy Tokens ----------
async function buyToken(projectId){
  if(!signer){alert("Connect wallet first!"); return;}
  try{
    const tx=await contract.purchaseCarbonToken(projectId,{value:ethers.parseEther("0.01")});
    await tx.wait();
    alert("Token purchased successfully!");
    updateProjectBalance(projectId);
  }catch(e){console.error(e);alert("Purchase failed");}
}

// ---------- Retire Tokens ----------
async function retireToken(projectId){
  if(!signer){alert("Connect wallet first!"); return;}
  try{
    const balance=await contract.balanceOf(await signer.getAddress(),projectId);
    if(balance==0){alert("No tokens to retire"); return;}
    const tx=await contract.retireToken(projectId,balance);
    await tx.wait();
    alert("Tokens retired successfully!");
    updateProjectBalance(projectId);
  }catch(e){console.error(e);alert("Retirement failed");}
}

// ---------- Update Balance & CO2 Meter ----------
async function updateProjectBalance(projectId){
  const balanceEl=document.getElementById(`balance-${projectId}`);
  const co2Fill=document.getElementById(`co2-fill-${projectId}`);
  try{
    const userAddr=await signer.getAddress();
    const balance=await contract.balanceOf(userAddr,projectId);
    const retired=await contract.retirementHistory(userAddr,projectId);
    balanceEl.innerText=`Balance: ${balance} | Retired: ${retired}`;
    // Dynamic CO2 meter
    const projectCO2=projects.find(p=>p.id===projectId).co2;
    const percent=Math.min(100,(retired/projectCO2)*100);
    co2Fill.style.width=`${percent}%`;
  }catch(e){balanceEl.innerText="Balance: 0"; co2Fill.style.width="0%";}
}

// ---------- 3D Token Animation ----------
function init3DToken(canvasId){
  const canvas=document.getElementById(canvasId);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(50,1,0.1,1000);
  camera.position.z=2.5;
  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setSize(150,150);
  const geometry=new THREE.TetrahedronGeometry(0.5);
  const material=new THREE.MeshStandardMaterial({color:0x00FF96,metalness:0.7,roughness:0.2});
  const token=new THREE.Mesh(geometry,material);
  scene.add(token);
  const light=new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,5,5);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  function animate(){requestAnimationFrame(animate);token.rotation.x+=0.01;token.rotation.y+=0.01;renderer.render(scene,camera);}
  animate();
}

// ---------- Header scroll ----------
window.addEventListener('scroll',()=>{document.getElementById('header').classList.toggle('scrolled',window.scrollY>50)});

// ---------- Init dashboard ----------
init();
</script>

</body>
</html>
